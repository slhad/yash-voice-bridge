name: Build AppImage

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
  workflow_call:
    inputs:
      tag_name:
        required: true
        type: string

permissions:
  contents: write

concurrency:
  group: appimage-${{ github.workflow }}-${{ github.ref_name || github.run_id }}
  cancel-in-progress: false

jobs:
  build-appimage:
    name: Build AppImage (Linux x86_64)
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: "1.3.6"

      - name: Resolve build metadata
        id: meta
        shell: bash
        run: |
          if [[ -n "${{ inputs.tag_name }}" ]]; then
            version="${{ inputs.tag_name }}"
            version="${version#v}"
            release_tag="${{ inputs.tag_name }}"
            artifact_name="yash-voice-bridge-${{ inputs.tag_name }}-x86_64.AppImage"
            is_release=true
          elif [[ "${GITHUB_REF_TYPE}" == "tag" ]]; then
            version="${GITHUB_REF_NAME#v}"
            release_tag="${GITHUB_REF_NAME}"
            artifact_name="yash-voice-bridge-${GITHUB_REF_NAME}-x86_64.AppImage"
            is_release=true
          else
            version="manual-${GITHUB_SHA::7}"
            release_tag=""
            artifact_name="yash-voice-bridge-${version}-x86_64.AppImage"
            is_release=false
          fi

          echo "version=${version}" >> "$GITHUB_OUTPUT"
          echo "release_tag=${release_tag}" >> "$GITHUB_OUTPUT"
          echo "artifact_name=${artifact_name}" >> "$GITHUB_OUTPUT"
          echo "is_release=${is_release}" >> "$GITHUB_OUTPUT"

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Typecheck
        run: bun run typecheck

      - name: Build AppImage
        env:
          VERSION: ${{ steps.meta.outputs.version }}
          APPIMAGE_NAME: ${{ steps.meta.outputs.artifact_name }}
        run: ./scripts/build-appimage.sh

      - name: Upload AppImage artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ steps.meta.outputs.artifact_name }}
          path: ${{ steps.meta.outputs.artifact_name }}
          if-no-files-found: error

      - name: Publish tagged release
        if: steps.meta.outputs.is_release == 'true'
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.meta.outputs.release_tag }}
          name: ${{ steps.meta.outputs.release_tag }}
          files: ${{ steps.meta.outputs.artifact_name }}
          generate_release_notes: true
